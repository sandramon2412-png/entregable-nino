<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>40 Atividades Interativas — Do Zero à Leitura</title>
<style>
  :root {
    --purple: #6C3FC5; --purple-light: #EEE6FF; --purple-mid: #9B72E8;
    --yellow: #FFD600; --yellow-light: #FFFBE6;
    --green: #2ECC71; --green-light: #E8F8F0;
    --orange: #FF8C00; --orange-light: #FFF3E0;
    --pink: #E91E8C; --pink-light: #FFE8F4;
    --dark: #1A1A2E; --gray: #666; --gray-light: #F5F5F5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--gray-light); color: var(--dark); }

  /* HEADER */
  header { background: linear-gradient(135deg, var(--purple), var(--purple-mid)); color: #fff; padding: 20px; text-align: center; }
  header h1 { font-size: clamp(1.4rem, 4vw, 2rem); }
  header p { opacity: .85; margin-top: 4px; font-size: .95rem; }
  .stars { color: var(--yellow); font-size: 1.3rem; margin-bottom: 6px; }

  /* PROGRESS BAR */
  .progress-wrap { background: rgba(0,0,0,.2); border-radius: 20px; height: 12px; margin: 14px auto; max-width: 400px; }
  .progress-bar { background: var(--yellow); border-radius: 20px; height: 12px; transition: width .4s; }
  .progress-label { color: rgba(255,255,255,.9); font-size: .85rem; margin-top: 4px; }

  /* FASE TABS */
  .fase-tabs { display: flex; gap: 8px; padding: 16px; overflow-x: auto; background: #fff; border-bottom: 2px solid #eee; }
  .fase-tab { flex-shrink: 0; padding: 8px 18px; border-radius: 20px; border: none; cursor: pointer; font-size: .9rem; font-weight: 700; transition: all .2s; }
  .fase-tab.f1 { background: var(--purple-light); color: var(--purple); }
  .fase-tab.f2 { background: var(--green-light); color: var(--green); }
  .fase-tab.f3 { background: var(--orange-light); color: var(--orange); }
  .fase-tab.f4 { background: var(--pink-light); color: var(--pink); }
  .fase-tab.active { color: #fff; transform: scale(1.05); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
  .fase-tab.f1.active { background: var(--purple); }
  .fase-tab.f2.active { background: var(--green); }
  .fase-tab.f3.active { background: var(--orange); }
  .fase-tab.f4.active { background: var(--pink); }

  /* ACTIVITIES GRID */
  .activity-list { padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .act-card { background: #fff; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.08); overflow: hidden; cursor: pointer; transition: transform .2s, box-shadow .2s; }
  .act-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.13); }
  .act-card.done { opacity: .7; }
  .act-header { padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
  .act-num { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1rem; color: #fff; flex-shrink: 0; }
  .act-title { font-weight: 700; font-size: .95rem; }
  .act-body { padding: 0 16px 14px; font-size: .85rem; color: var(--gray); }
  .act-done-badge { font-size: .75rem; padding: 2px 8px; border-radius: 10px; margin-left: auto; font-weight: 700; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 20px; max-width: 580px; width: 100%; max-height: 92vh; overflow-y: auto; position: relative; }
  .modal-header { padding: 20px 20px 14px; border-radius: 20px 20px 0 0; }
  .modal-header h2 { font-size: 1.3rem; color: #fff; }
  .modal-body { padding: 20px; }
  .close-btn { position: absolute; top: 14px; right: 16px; background: rgba(255,255,255,.25); border: none; color: #fff; width: 32px; height: 32px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .modal-section { margin-bottom: 14px; }
  .modal-section label { font-size: .8rem; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 5px; }
  .modal-section p { font-size: .95rem; line-height: 1.6; }
  .steps-list { list-style: none; counter-reset: steps; }
  .steps-list li { counter-increment: steps; display: flex; gap: 10px; margin-bottom: 8px; font-size: .93rem; line-height: 1.5; }
  .steps-list li::before { content: counter(steps); background: var(--purple); color: #fff; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
  .tip-box { background: var(--yellow-light); border-left: 4px solid var(--yellow); border-radius: 8px; padding: 12px; font-size: .88rem; line-height: 1.5; }
  .tip-box strong { color: #5A4A00; }

  /* INTERACTIVE ZONES */
  .game-zone { background: var(--gray-light); border-radius: 12px; padding: 16px; margin-top: 14px; }
  .game-zone h3 { font-size: .95rem; margin-bottom: 12px; color: var(--dark); }
  .write-area { width: 100%; min-height: 80px; border: 2px dashed #ccc; border-radius: 8px; padding: 10px; font-size: 1rem; font-family: inherit; resize: vertical; background: #fff; }
  .write-area:focus { outline: none; border-color: var(--purple); }
  .options-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
  .opt-btn { padding: 10px 8px; background: #fff; border: 2px solid #ddd; border-radius: 10px; cursor: pointer; font-size: .95rem; font-weight: 600; text-align: center; transition: all .15s; }
  .opt-btn:hover { border-color: var(--purple); background: var(--purple-light); }
  .opt-btn.correct { background: var(--green-light); border-color: var(--green); color: var(--green); }
  .opt-btn.wrong { background: #FFE5E5; border-color: #E53935; color: #E53935; animation: shake .3s; }
  .opt-btn.selected { background: var(--purple-light); border-color: var(--purple); }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  .drag-zone { display: flex; flex-wrap: wrap; gap: 8px; min-height: 50px; border: 2px dashed #ccc; border-radius: 10px; padding: 10px; background: #fff; }
  .drag-zone.highlight { border-color: var(--purple); background: var(--purple-light); }
  .drag-item { padding: 8px 14px; background: var(--purple-light); border: 2px solid var(--purple); border-radius: 20px; cursor: grab; font-weight: 700; font-size: .95rem; color: var(--purple); user-select: none; }
  .drag-item:active { cursor: grabbing; }

  .palmas-btn { padding: 16px 28px; background: var(--purple); color: #fff; border: none; border-radius: 14px; font-size: 1.1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: transform .1s; }
  .palmas-btn:active { transform: scale(.95); }
  .palmas-count { font-size: 2.5rem; font-weight: 900; color: var(--purple); text-align: center; margin: 10px 0; }
  .palmas-word { font-size: 1.3rem; font-weight: 700; text-align: center; color: var(--dark); margin-bottom: 12px; }

  .letter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(44px, 1fr)); gap: 6px; }
  .letter-cell { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 900; border-radius: 8px; cursor: pointer; border: 2px solid #ddd; background: #fff; transition: all .15s; }
  .letter-cell:hover { background: var(--purple-light); border-color: var(--purple); }
  .letter-cell.found { background: var(--green-light); border-color: var(--green); color: var(--green); }

  .fb-msg { padding: 10px 14px; border-radius: 8px; font-size: .9rem; font-weight: 700; margin-top: 10px; display: none; }
  .fb-msg.ok { background: var(--green-light); color: var(--green); display: block; }
  .fb-msg.err { background: #FFE5E5; color: #E53935; display: block; }

  .complete-btn { width: 100%; padding: 14px; background: var(--green); color: #fff; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 16px; transition: background .2s; }
  .complete-btn:hover { background: #27AE60; }

  /* CONFETTI */
  .confetti { position: fixed; pointer-events: none; z-index: 999; top: 0; left: 0; width: 100%; height: 100%; }

  /* SCORE */
  .score-bar { background: #fff; padding: 12px 16px; display: flex; justify-content: space-around; border-bottom: 1px solid #eee; font-size: .85rem; }
  .score-item { text-align: center; }
  .score-num { font-size: 1.4rem; font-weight: 900; color: var(--purple); }

  @media (max-width: 480px) {
    .activity-list { grid-template-columns: 1fr; }
    .modal { border-radius: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="stars">★ ★ ★ ★ ★</div>
  <h1>40 Atividades Interativas</h1>
  <p>Do Zero à Leitura em 90 Dias · App LittleStar</p>
  <div class="progress-wrap"><div class="progress-bar" id="progBar" style="width:0%"></div></div>
  <div class="progress-label" id="progLabel">0 de 40 concluídas</div>
</header>

<div class="score-bar">
  <div class="score-item"><div class="score-num" id="scoreStars">0</div><div>⭐ Estrelas</div></div>
  <div class="score-item"><div class="score-num" id="scoreDone">0</div><div>✓ Feitas</div></div>
  <div class="score-item"><div class="score-num" id="scorePhase">1</div><div>Fase atual</div></div>
</div>

<div class="fase-tabs">
  <button class="fase-tab f1 active" onclick="setFase(1)">Fase 1 — Sons</button>
  <button class="fase-tab f2" onclick="setFase(2)">Fase 2 — Alfabeto</button>
  <button class="fase-tab f3" onclick="setFase(3)">Fase 3 — Sílabas</button>
  <button class="fase-tab f4" onclick="setFase(4)">Fase 4 — Leitura</button>
</div>

<div class="activity-list" id="actList"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header" id="modalHeader">
      <h2 id="modalTitle"></h2>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<canvas class="confetti" id="confetti"></canvas>

// ─── STATE ───────────────────────────────────────────────────────────────────
let done = JSON.parse(localStorage.getItem('ativ_done') || '[]');
let stars = parseInt(localStorage.getItem('ativ_stars') || '0');
let currentFase = 1;

function save() {
  localStorage.setItem('ativ_done', JSON.stringify(done));
  localStorage.setItem('ativ_stars', stars);
  updateScore();
}

function updateScore() {
  const pct = (done.length / 40) * 100;
  document.getElementById('progBar').style.width = pct + '%';
  document.getElementById('progLabel').textContent = done.length + ' de 40 concluídas';
  document.getElementById('scoreStars').textContent = stars;
  document.getElementById('scoreDone').textContent = done.length;
  const phases = done.map(n => ACTIVITIES.find(a => a.num === n)?.fase || 1);
  document.getElementById('scorePhase').textContent = Math.max(...phases, 1);
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function setFase(f) {
  currentFase = f;
  document.querySelectorAll('.fase-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.fase-tab')[f-1].classList.add('active');
  renderList();
}

function renderList() {
  const list = document.getElementById('actList');
  const acts = ACTIVITIES.filter(a => a.fase === currentFase);
  const col = FASE_COLORS[currentFase];
  const light = FASE_LIGHT[currentFase];
  list.innerHTML = acts.map(a => {
    const isDone = done.includes(a.num);
    return `<div class="act-card${isDone?' done':''}" onclick="openActivity(${a.num})">
      <div class="act-header" style="background:${light}">
        <div class="act-num" style="background:${col}">${a.num}</div>
        <div class="act-title">${a.title}</div>
        ${isDone ? `<span class="act-done-badge" style="background:${col};color:#fff">✓ Feita</span>` : ''}
      </div>
      <div class="act-body">${a.obj}</div>
    </div>`;
  }).join('');
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
let currentAct = null;

function openActivity(num) {
  currentAct = ACTIVITIES.find(a => a.num === num);
  if (!currentAct) return;
  const col = FASE_COLORS[currentAct.fase];
  document.getElementById('modalHeader').style.background = col;
  document.getElementById('modalTitle').textContent = `${currentAct.num}. ${currentAct.title}`;
  document.getElementById('modalBody').innerHTML = buildGameHTML(currentAct);
  document.getElementById('modal').classList.add('open');
  initGame(currentAct);
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function buildGameHTML(act) {
  const col = FASE_COLORS[act.fase];
  return `
    <div class="modal-section">
      <label>Objetivo</label>
      <p>${act.obj}</p>
    </div>
    <div class="modal-section">
      <label>Materiais</label>
      <p>${act.mat}</p>
    </div>
    <div class="modal-section">
      <label>Como fazer</label>
      <ul class="steps-list">${act.steps.map(s=>`<li>${s}</li>`).join('')}</ul>
    </div>
    <div class="game-zone" id="gameZone">
      ${getGameHTML(act)}
    </div>
    <div class="tip-box" style="margin-top:14px">
      <strong>★ Dica para os pais:</strong> ${act.tip}
    </div>
    <button class="complete-btn" style="background:${col}" onclick="markDone(${act.num})">
      ${done.includes(act.num) ? '✓ Já concluída! Fazer de novo?' : '✓ Marcar como concluída e ganhar ⭐'}
    </button>`;
}

  vcIdx=0; vcScore=0; wbBuilt=[]; msIdx=0; msScore=0; wiIdx=0;

  if (g==='rhyme') renderRH();

  if (g==='word_builder') renderWB();

function renderSI() {
  if (siIdx>=SI_DATA.length) return;
  const d = SI_DATA[siIdx];
  document.getElementById('si_word').textContent = d.word;
  const opts = ['B','M','P','S','L','T','G','A'].sort(()=>Math.random()-.5).slice(0,5);
  if (!opts.includes(d.ans)) opts[0]=d.ans;
  document.getElementById('si_opts').innerHTML = opts.sort(()=>Math.random()-.5)
    .map(o=>`<button class="opt-btn" onclick="checkSI('${o}')">${o}</button>`).join('');
  document.getElementById('si_fb').className='fb-msg';
  document.getElementById('si_score').textContent = siScore+'/5 acertos';
}
function checkSI(v) {
  const d=SI_DATA[siIdx], el=document.getElementById('si_fb');
  if (v===d.ans) {
    siScore++; siIdx++;
    el.textContent='✓ Correto! '+d.word+' começa com '+d.ans+'!';
    el.className='fb-msg ok';
    document.querySelectorAll('#si_opts .opt-btn').forEach(b=>{if(b.textContent===v)b.classList.add('correct');});

function checkVC(type) {
  const letter=VC_LETTERS[vcIdx];
  const isVowel=VOWELS.includes(letter);
  const correct=(type==='vogal')===isVowel;
  const el=document.getElementById('vc_fb');
  if (correct) {
    vcScore++; vcIdx++;
    el.textContent='✓ Correto! '+letter+' é uma '+(isVowel?'vogal':'consoante')+'!'; el.className='fb-msg ok';
    document.getElementById('vc_score').textContent=vcScore+'/10 acertos';
    if (vcScore>=10) { el.textContent='🏆 Você acertou 10 seguidas! Mestre das letras!'; return; }
    setTimeout(renderVC,1000);
  } else {
    el.textContent='Ops! '+letter+' é uma '+(isVowel?'vogal':'consoante')+'. Vogais são A, E, I, O, U!'; el.className='fb-msg err';
    setTimeout(()=>el.className='fb-msg',1000);
  }
}

function startTimer() {
  if (srTimer) return;
  srStart=Date.now();
  const btn=document.getElementById('sr_btn');
  btn.textContent='⏹ TERMINEI'; btn.onclick=stopTimer;
  btn.style.background='#E53935';
  let t=setInterval(()=>{
    const s=((Date.now()-srStart)/1000).toFixed(1);
    document.getElementById('sr_result').textContent='⏱ '+s+'s';
  },100);
  srTimer=t;
}
function stopTimer() {
  clearInterval(srTimer); srTimer=null;
  const secs=(Date.now()-srStart)/1000;
  const words=22; const wpm=Math.round((words/secs)*60);
  document.getElementById('sr_result').textContent=`✓ ${secs.toFixed(1)}s · ${wpm} palavras/minuto`;
  document.getElementById('sr_btn').textContent='▶ TENTAR DE NOVO'; document.getElementById('sr_btn').onclick=()=>{srTimer=null;startTimer();};
  document.getElementById('sr_btn').style.background='#E91E8C';
}

  setTimeout(closeModal, 800);
}

// ─── CONFETTI ────────────────────────────────────────────────────────────────
function launchConfetti() {
  const canvas=document.getElementById('confetti');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const pieces=Array.from({length:80},()=>({
    x:Math.random()*canvas.width, y:-10,
    r:Math.random()*6+3, c:['#6C3FC5','#FFD600','#2ECC71','#FF8C00','#E91E8C'][Math.floor(Math.random()*5)],
    vx:(Math.random()-.5)*4, vy:Math.random()*4+2, spin:Math.random()*0.2
  }));
  let frame; function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{ ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      p.x+=p.vx; p.y+=p.vy; p.vy+=.1; });
    if (pieces.some(p=>p.y<canvas.height+20)) frame=requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}
