<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12 Vídeos Animados – Do Zero à Leitura em 90 Dias</title>
<style>
  :root {
    --roxo: #6C3FC5;
    --verde: #3DBE7A;
    --laranja: #FF8C42;
    --rosa: #FF6B9D;
    --amarelo: #FFD166;
    --azul: #4ECDC4;
    --bg: #f0eafb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); }

  /* ===== MENU ===== */
  #menu {
    min-height: 100vh;
    background: linear-gradient(135deg, #6C3FC5 0%, #4ECDC4 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 30px 20px;
  }
  #menu h1 { color: #fff; font-size: 2rem; text-align: center; margin-bottom: 8px; }
  #menu p { color: rgba(255,255,255,0.85); text-align: center; margin-bottom: 36px; font-size: 1.1rem; }
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 900px;
  }
  .menu-card {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    cursor: pointer;
    transition: transform .2s, box-shadow .2s;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    box-shadow: 0 4px 14px rgba(0,0,0,.15);
  }
  .menu-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.2); }
  .menu-card .num { font-size: 2rem; font-weight: 900; }
  .menu-card .title { font-size: .9rem; font-weight: 700; text-align: center; color: #333; }
  .menu-card .badge {
    font-size: .7rem; padding: 2px 10px; border-radius: 20px; color: #fff; font-weight: 700;
  }
  .fase1 { border-top: 5px solid var(--roxo); }
  .fase2 { border-top: 5px solid var(--verde); }
  .fase3 { border-top: 5px solid var(--laranja); }
  .fase4 { border-top: 5px solid var(--rosa); }
  .fase1 .num { color: var(--roxo); }
  .fase2 .num { color: var(--verde); }
  .fase3 .num { color: var(--laranja); }
  .fase4 .num { color: var(--rosa); }
  .fase1 .badge { background: var(--roxo); }
  .fase2 .badge { background: var(--verde); }
  .fase3 .badge { background: var(--laranja); }
  .fase4 .badge { background: var(--rosa); }

  /* ===== PLAYER ===== */
  #player { display: none; position: fixed; inset: 0; background: #000; z-index: 100; }
  #player.active { display: flex; flex-direction: column; }

  .player-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    background: rgba(0,0,0,.7);
    color: #fff;
    z-index: 10;
  }
  .player-top h2 { font-size: 1rem; flex: 1; text-align: center; }
  .btn-close {
    background: rgba(255,255,255,.15); border: none; color: #fff;
    border-radius: 50%; width: 36px; height: 36px; cursor: pointer;
    font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
  }
  .btn-close:hover { background: rgba(255,255,255,.3); }

  /* slide area */
  #slide-area {
    flex: 1; position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .slide {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 30px 40px;
    opacity: 0; transform: scale(.95);
    transition: opacity .6s ease, transform .6s ease;
    pointer-events: none;
  }
  .slide.active { opacity: 1; transform: scale(1); pointer-events: all; }
  .slide.exit { opacity: 0; transform: scale(1.05); }

  .slide-emoji { font-size: clamp(4rem, 12vw, 7rem); margin-bottom: 20px; animation: bounce 2s infinite; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  .slide-title { font-size: clamp(1.4rem, 5vw, 2.4rem); font-weight: 900; text-align: center; margin-bottom: 14px; color: #fff; text-shadow: 2px 2px 8px rgba(0,0,0,.4); }
  .slide-text { font-size: clamp(.9rem, 3vw, 1.2rem); text-align: center; color: rgba(255,255,255,.9); max-width: 650px; line-height: 1.7; }
  .slide-highlight {
    background: rgba(255,255,255,.18);
    border-radius: 16px;
    padding: 18px 28px;
    margin-top: 18px;
    color: #fff;
    font-size: clamp(.85rem, 2.5vw, 1.1rem);
    text-align: center;
    border: 2px solid rgba(255,255,255,.3);
    max-width: 600px;
  }
  .slide-list { list-style: none; margin-top: 16px; display: flex; flex-direction: column; gap: 10px; max-width: 580px; width: 100%; }
  .slide-list li {
    background: rgba(255,255,255,.15); border-radius: 12px; padding: 12px 18px;
    color: #fff; font-size: clamp(.85rem, 2.5vw, 1.05rem); display: flex; align-items: center; gap: 12px;
    animation: slideInLeft .5s ease both;
  }
  .slide-list li span.ico { font-size: 1.4rem; }
  @keyframes slideInLeft { from { opacity:0; transform: translateX(-30px); } to { opacity:1; transform: translateX(0); } }
  .slide-list li:nth-child(2) { animation-delay: .1s; }
  .slide-list li:nth-child(3) { animation-delay: .2s; }
  .slide-list li:nth-child(4) { animation-delay: .3s; }
  .slide-list li:nth-child(5) { animation-delay: .4s; }

  /* big letter */
  .big-letter {
    font-size: clamp(6rem, 18vw, 10rem);
    font-weight: 900; color: #fff;
    text-shadow: 4px 4px 0 rgba(0,0,0,.2);
    animation: popIn .5s cubic-bezier(.175,.885,.32,1.275);
    line-height: 1;
  }
  @keyframes popIn { from { transform: scale(0); opacity:0; } to { transform: scale(1); opacity:1; } }

  /* syllable blocks */
  .syl-row { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
  .syl-block {
    background: rgba(255,255,255,.2); border: 3px solid rgba(255,255,255,.5);
    border-radius: 16px; padding: 16px 24px;
    font-size: clamp(1.8rem, 6vw, 3rem); font-weight: 900; color: #fff;
    animation: popIn .4s ease both;
    cursor: default;
    transition: transform .2s, background .2s;
  }
  .syl-block:hover { transform: scale(1.1); background: rgba(255,255,255,.35); }

  /* word row */
  .word-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
  .word-chip {
    background: rgba(255,255,255,.2); border-radius: 50px;
    padding: 10px 22px; color: #fff; font-weight: 700;
    font-size: clamp(1rem, 3vw, 1.4rem);
    animation: popIn .4s ease both;
  }

  /* progress dots */
  #progress-dots {
    display: flex; justify-content: center; align-items: center; gap: 8px;
    padding: 10px;
    background: rgba(0,0,0,.5);
  }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(255,255,255,.35); transition: background .3s, transform .3s;
  }
  .dot.active { background: #fff; transform: scale(1.3); }

  /* nav controls */
  .nav-controls {
    display: flex; align-items: center; justify-content: center; gap: 16px;
    padding: 12px 16px;
    background: rgba(0,0,0,.7);
  }
  .btn-nav {
    background: rgba(255,255,255,.15); border: none; color: #fff;
    border-radius: 50px; padding: 10px 28px; cursor: pointer;
    font-size: 1rem; font-weight: 700; transition: background .2s;
  }
  .btn-nav:hover { background: rgba(255,255,255,.3); }
  .btn-nav:disabled { opacity: .3; cursor: not-allowed; }
  #slide-counter { color: rgba(255,255,255,.7); font-size: .9rem; min-width: 70px; text-align: center; }

  /* auto-play bar */
  #autoplay-bar {
    height: 4px;
    background: rgba(255,255,255,.2);
    position: absolute;
    bottom: 0; left: 0; right: 0;
  }
  #autoplay-progress {
    height: 100%;
    background: var(--amarelo);
    width: 0%;
    transition: width linear;
  }

  /* floating particles */
  .particle {
    position: absolute;
    border-radius: 50%;
    opacity: .35;
    animation: float-p linear infinite;
    pointer-events: none;
  }
  @keyframes float-p {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: .4; }
    90% { opacity: .3; }
    100% { transform: translateY(-100px) scale(1); opacity: 0; }
  }

  /* congrats overlay */
  #congrats {
    display: none; position: absolute; inset: 0;
    background: rgba(0,0,0,.8);
    flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    z-index: 20;
  }
  #congrats.show { display: flex; }
  #congrats h2 { color: #fff; font-size: 2rem; text-align: center; }
  #congrats p { color: rgba(255,255,255,.8); text-align: center; }
  .btn-restart {
    background: var(--verde); border: none; color: #fff;
    border-radius: 50px; padding: 14px 36px; font-size: 1.1rem; font-weight: 700;
    cursor: pointer; margin-top: 10px;
  }
  .btn-restart:hover { background: #32a065; }

  /* audio button */
  .btn-audio {
    background: rgba(255,255,255,.15); border: none; color: #fff;
    border-radius: 50%; width: 36px; height: 36px; cursor: pointer;
    font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .btn-audio:hover { background: rgba(255,255,255,.3); }
  .btn-audio.muted { background: rgba(255,80,80,.4); }

  /* speaking indicator */
  #speaking-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: transparent; z-index: 5; pointer-events: none;
  }
  #speaking-bar.active {
    background: linear-gradient(90deg, #FFD166, #FF6B9D, #4ECDC4, #FFD166);
    background-size: 200% 100%;
    animation: speakingShimmer 1.5s linear infinite;
  }
  @keyframes speakingShimmer { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }

  /* canvas for confetti */
  #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 200; }
</style>
</head>

<canvas id="confetti-canvas"></canvas>

<!-- MENU -->

  <p>Do Zero à Leitura em 90 Dias · Toca num vídeo para começar!</p>

  </div>

  <div id="slide-area">
    <div id="speaking-bar"></div>
    <div id="autoplay-bar"><div id="autoplay-progress"></div></div>
    <div id="congrats" class="">
      <div style="font-size:4rem">🏆</div>
      <h2>Parabéns!</h2>
      <p id="congrats-msg">Você assistiu ao vídeo completo!</p>
      <button class="btn-restart" onclick="restartVideo()">▶ Ver de novo</button>
      <button class="btn-restart" style="background:var(--roxo)" onclick="closePlayer()">← Menu</button>

  <div id="progress-dots"></div>
  <div class="nav-controls">
    <button class="btn-nav" id="btn-prev" onclick="prevSlide()">← Anterior</button>
    <span id="slide-counter">1 / 5</span>
    <button class="btn-nav" id="btn-next" onclick="nextSlide()">Próximo →</button>
  </div>
</div>

// MENU RENDER
// ============================================================
const faseNames = {1:"Fase 1", 2:"Fase 2", 3:"Fase 3", 4:"Fase 4"};

videos.forEach(v => {
  const card = document.createElement("div");
  card.className = `menu-card fase${v.fase}`;
  card.innerHTML = `
    <div class="num">${v.emoji}</div>

  `;

  menuGrid.appendChild(card);
});

// ============================================================
// SPEECH SYNTHESIS
// ============================================================
let isMuted = false;
let voices = [];

// Load voices (async on some browsers)
function loadVoices() {
  voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
}
if (window.speechSynthesis) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function toggleMute() {
  isMuted = !isMuted;
  const btn = document.getElementById("btn-audio");
  btn.textContent = isMuted ? "🔇" : "🔊";
  btn.classList.toggle("muted", isMuted);
  if (isMuted) {
    window.speechSynthesis && window.speechSynthesis.cancel();
    document.getElementById("speaking-bar").classList.remove("active");
  } else {
    // Speak current slide when unmuting
    if (currentVideo) speakSlide(currentVideo.slides[currentSlideIndex]);
  }
}

function speakSlide(s) {
  if (isMuted || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();

  // Build narration text
  let parts = [s.title];
  if (s.text)      parts.push(s.text.replace(/\n/g, ". "));
  if (s.highlight) parts.push(s.highlight.replace(/\n/g, ". ").replace(/[·•]/g, ","));
  if (s.extra)     parts.push(s.extra.replace(/[·•–]/g, ",").replace(/\n/g, ". "));
  if (s.items)     parts.push(s.items.map(i => i.txt).join(". "));
  if (s.syls && s.syls.every(sy => /^[A-ZÀ-Ú]{1,3}$/i.test(sy.replace(/[^\w]/g,""))))
                   parts.push("Repita: " + s.syls.join(", "));
  if (s.words)     parts.push("Leia: " + s.words.filter(w => !/^\p{Emoji}$/u.test(w)).join(" "));
  if (s.badge)     parts.push(s.badge.replace(/[🏆⭐🏅💫🌟]/g, ""));

  const text = parts.join(". ").replace(/\s+/g, " ").trim();
  if (!text) return;

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "pt-BR";
  utter.rate = 0.88;
  utter.pitch = 1.1;
  utter.volume = 1;

  // Prefer a PT-BR voice
  const ptVoice = voices.find(v => v.lang === "pt-BR") ||
                  voices.find(v => v.lang.startsWith("pt")) || null;
  if (ptVoice) utter.voice = ptVoice;

  const bar = document.getElementById("speaking-bar");
  utter.onstart  = () => bar.classList.add("active");
  utter.onend    = () => bar.classList.remove("active");
  utter.onerror  = () => bar.classList.remove("active");

  window.speechSynthesis.speak(utter);
}

function stopSpeech() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  document.getElementById("speaking-bar").classList.remove("active");
}

// ============================================================
// PLAYER STATE
// ============================================================
let currentVideo = null;
let currentSlideIndex = 0;
let autoTimer = null;
let progressTimer = null;
const SLIDE_DURATION = 10000; // 10s per slide (more time for narration)

function openVideo(id) {
  currentVideo = videos.find(v => v.id === id);
  currentSlideIndex = 0;
  document.getElementById("menu").style.display = "none";
  const player = document.getElementById("player");
  player.classList.add("active");
  player.style.display = "flex";
  document.getElementById("player-title").textContent = `${currentVideo.emoji} Vídeo ${id}: ${currentVideo.title}`;
  document.getElementById("congrats").classList.remove("show");
  // Reset mute button
  document.getElementById("btn-audio").textContent = "🔊";
  document.getElementById("btn-audio").classList.remove("muted");
  isMuted = false;
  renderSlides();
  buildDots();
  showSlide(0);
  spawnParticles();
}

function closePlayer() {
  stopAutoPlay();
  stopSpeech();
  document.getElementById("player").classList.remove("active");
  document.getElementById("player").style.display = "none";
  document.getElementById("menu").style.display = "flex";
  clearParticles();
}

function restartVideo() {
  document.getElementById("congrats").classList.remove("show");
  currentSlideIndex = 0;
  showSlide(0);
  spawnParticles();
}

// ============================================================
// SLIDE RENDERING
// ============================================================
function renderSlides() {
  const area = document.getElementById("slide-area");
  // remove old slides
  area.querySelectorAll(".slide").forEach(s => s.remove());

  currentVideo.slides.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "slide";
    div.id = `slide-${i}`;
    div.style.background = currentVideo.bg;
    div.innerHTML = buildSlideHTML(s);
    area.appendChild(div);
  });
}

function buildSlideHTML(s) {
  switch(s.type) {
    case "cover":
      return `<div class="slide-emoji">${s.emoji}</div>
              <div class="slide-title">${s.title}</div>
              <div class="slide-text" style="white-space:pre-line">${s.text}</div>`;
    case "text":
      return `<div class="slide-emoji">${s.emoji}</div>
              <div class="slide-title">${s.title}</div>
              <div class="slide-text">${s.text}</div>
              ${s.highlight ? `<div class="slide-highlight" style="white-space:pre-line">${s.highlight}</div>` : ""}`;
    case "big":
      return `<div class="slide-emoji">${s.emoji}</div>
              <div class="slide-title">${s.title}</div>
              <div class="slide-text">${s.text}</div>
              <div class="big-letter">${s.extra || ""}</div>`;
    case "list":
      const items = s.items.map((it,idx) => `<li style="animation-delay:${idx*0.1}s"><span class="ico">${it.ico}</span>${it.txt}</li>`).join("");
      return `<div class="slide-emoji">${s.emoji}</div>
              <div class="slide-title">${s.title}</div>
              <ul class="slide-list">${items}</ul>`;
    case "syl":
      const sylBlocks = s.syls.map((sy,i) => `<div class="syl-block" style="animation-delay:${i*0.08}s">${sy}</div>`).join("");
      return `<div class="slide-emoji">${s.emoji}</div>
              <div class="slide-title">${s.title}</div>
              <div class="slide-text">${s.text}</div>
              <div class="syl-row">${sylBlocks}</div>`;
    case "words":
      const wordChips = s.words.map((w,i) => `<div class="word-chip" style="animation-delay:${i*0.1}s">${w}</div>`).join("");
      return `<div class="slide-emoji">${s.emoji}</div>
              <div class="slide-title">${s.title}</div>
              <div class="slide-text">${s.text}</div>
              <div class="word-row">${wordChips}</div>`;
    case "end":
      return `<div class="slide-emoji">${s.emoji}</div>
              <div class="slide-title">${s.title}</div>
              <div class="slide-text">${s.text}</div>
              ${s.badge ? `<div class="slide-highlight" style="font-size:1.2rem;font-weight:900">${s.badge}</div>` : ""}`;
    default:
      return `<div class="slide-title">${s.title}</div>`;
  }
}

// ============================================================
// NAVIGATION
// ============================================================
function buildDots() {
  const container = document.getElementById("progress-dots");
  container.innerHTML = "";
  currentVideo.slides.forEach((_, i) => {
    const dot = document.createElement("div");
    dot.className = "dot";
    dot.id = `dot-${i}`;
    dot.onclick = () => showSlide(i);
    container.appendChild(dot);
  });
}

function showSlide(idx) {
  stopAutoPlay();
  stopSpeech();
  const slides = document.querySelectorAll(".slide");
  slides.forEach((s, i) => {
    s.classList.remove("active", "exit");
    if (i === idx) s.classList.add("active");
  });
  document.querySelectorAll(".dot").forEach((d, i) => {
    d.classList.toggle("active", i === idx);
  });
  currentSlideIndex = idx;
  const total = currentVideo.slides.length;
  document.getElementById("slide-counter").textContent = `${idx + 1} / ${total}`;
  document.getElementById("btn-prev").disabled = idx === 0;
  document.getElementById("btn-next").disabled = idx === total - 1;
  // Narrate after a brief delay so animation plays first
  setTimeout(() => speakSlide(currentVideo.slides[idx]), 600);
  startAutoPlay();
}

function nextSlide() {
  const total = currentVideo.slides.length;
  if (currentSlideIndex < total - 1) {
    showSlide(currentSlideIndex + 1);
  } else {
    stopAutoPlay();
    document.getElementById("congrats").classList.add("show");
    launchConfetti();
  }
}

function prevSlide() {
  if (currentSlideIndex > 0) showSlide(currentSlideIndex - 1);
}

// ============================================================
// AUTO-PLAY
// ============================================================
function startAutoPlay() {
  const bar = document.getElementById("autoplay-progress");
  bar.style.transition = "none";
  bar.style.width = "0%";
  setTimeout(() => {
    bar.style.transition = `width ${SLIDE_DURATION}ms linear`;
    bar.style.width = "100%";
  }, 50);
  autoTimer = setTimeout(() => nextSlide(), SLIDE_DURATION);
}

function stopAutoPlay() {
  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  const bar = document.getElementById("autoplay-progress");
  if (bar) { bar.style.transition = "none"; bar.style.width = "0%"; }
}

// ============================================================
// PARTICLES
// ============================================================
const particlePool = [];
function spawnParticles() {
  clearParticles();
  const area = document.getElementById("slide-area");
  const colors = ["#FF6B9D","#FFD166","#4ECDC4","#FF8C42","#6C3FC5","#3DBE7A"];
  for (let i = 0; i < 12; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    const size = Math.random() * 20 + 10;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${Math.random()*100}%;
      animation-duration:${Math.random()*8+6}s;
      animation-delay:${Math.random()*5}s;
    `;
    area.appendChild(p);
    particlePool.push(p);
  }
}
function clearParticles() {
  particlePool.forEach(p => p.remove());
  particlePool.length = 0;
}

// ============================================================
// CONFETTI
// ============================================================
const canvas = document.getElementById("confetti-canvas");
const ctx = canvas.getContext("2d");
let confettiParticles = [];
let animId = null;

function launchConfetti() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  confettiParticles = [];
  const colors = ["#FF6B9D","#FFD166","#4ECDC4","#FF8C42","#6C3FC5","#3DBE7A","#fff"];
  for (let i = 0; i < 150; i++) {
    confettiParticles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      w: Math.random() * 12 + 4,
      h: Math.random() * 6 + 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      rotation: Math.random() * 360,
      speed: Math.random() * 4 + 2,
      rotSpeed: (Math.random() - 0.5) * 4,
      drift: (Math.random() - 0.5) * 2
    });
  }
  if (animId) cancelAnimationFrame(animId);
  animateConfetti();
  setTimeout(() => { cancelAnimationFrame(animId); ctx.clearRect(0, 0, canvas.width, canvas.height); }, 4000);
}

function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  confettiParticles.forEach(p => {
    p.y += p.speed;
    p.x += p.drift;
    p.rotation += p.rotSpeed;
    ctx.save();
    ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
    ctx.rotate(p.rotation * Math.PI / 180);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
  });
  confettiParticles = confettiParticles.filter(p => p.y < canvas.height + 20);
  if (confettiParticles.length > 0) animId = requestAnimationFrame(animateConfetti);
}

// Keyboard navigation
document.addEventListener("keydown", e => {
  if (!currentVideo) return;
  if (e.key === "ArrowRight" || e.key === " ") nextSlide();
  if (e.key === "ArrowLeft") prevSlide();
  if (e.key === "Escape") closePlayer();
});

// Touch swipe
let touchStartX = 0;
document.getElementById("slide-area").addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; });
document.getElementById("slide-area").addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (dx < -50) nextSlide();
  if (dx > 50) prevSlide();
});
</script>
